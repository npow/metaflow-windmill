name: UX Tests

on:
  push:
    branches:
      - master
      - "**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # Unit tests (no Windmill server needed)
  # ------------------------------------------------------------------
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # Install metaflow from source if available, otherwise from PyPI
          pip install "metaflow>=2.9"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60

  # ------------------------------------------------------------------
  # Deployer tests (requires Windmill)
  # ------------------------------------------------------------------
  deployer-tests:
    name: "Deployer tests — ${{ matrix.test }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: test_hello_world
          - test: test_hello_project
          - test: test_from_deployment
          - test: test_fail_flow_reports_failed_status
          - test: test_split_in_branch_deployer

    env:
      METAFLOW_DEFAULT_METADATA: local
      METAFLOW_DEFAULT_DATASTORE: local
      METAFLOW_DATASTORE_SYSROOT_LOCAL: /tmp/mf-windmill-test
      METAFLOW_PROFILE: ""
      METAFLOW_HOME: /tmp/mf-windmill-test
      AWS_SHARED_CREDENTIALS_FILE: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: windmill
          POSTGRES_USER: windmill
          POSTGRES_DB: windmill
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Pin Metaflow local datastore root
        run: |
          mkdir -p /tmp/mf-windmill-test
          echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=/tmp/mf-windmill-test" >> "$GITHUB_ENV"

      - name: Wait for postgres to be ready
        run: |
          echo "Waiting for postgres to accept connections..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5432 -U windmill; do sleep 2; done' \
            && echo "Postgres is ready." \
            || echo "pg_isready timed out (postgres may still be healthy via service health check)"

      - name: Start Windmill server
        run: |
          docker run -d \
            --name windmill_server \
            --network host \
            -e DATABASE_URL="postgres://windmill:windmill@localhost:5432/windmill" \
            -e BASE_URL="http://localhost:8000" \
            -e MODE=server \
            ghcr.io/windmill-labs/windmill:main

      - name: Start Windmill worker
        run: |
          # Pitfall #9: Docker workers cannot reach host filesystem.
          # Mount workspace (for flow file path) and /tmp (for sysroot).
          docker run -d \
            --name windmill_worker \
            --network host \
            -v "${{ github.workspace }}":"${{ github.workspace }}" \
            -v /tmp:/tmp \
            -e DATABASE_URL="postgres://windmill:windmill@localhost:5432/windmill" \
            -e BASE_URL="http://localhost:8000" \
            -e MODE=worker \
            -e WORKER_GROUP=default \
            ghcr.io/windmill-labs/windmill:main

      - name: Pre-install metaflow in Windmill worker container
        run: |
          # The Windmill container has python3 but no pip (system python has no pip module).
          # Install pip first, then install OSS metaflow from PyPI.
          # NOT using source (npow/corral-devstack) — it loads Netflix-internal plugins
          # causing: ValueError: Cannot locate metadata_provider plugin 'service'.
          for i in $(seq 1 30); do
            if docker exec windmill_worker bash -c "
              # Install pip if missing (apt-get update needed — stale cache in container)
              python3 -c 'import pip' 2>/dev/null || \
                (apt-get update -q 2>&1 && apt-get install -y -q python3-pip 2>&1) || true
              # Install metaflow from PyPI (OSS-only, no internal plugins)
              python3 -m pip install --break-system-packages -q 'metaflow>=2.9' 2>&1 || \
              python3 -m pip install -q 'metaflow>=2.9' 2>&1
            "; then
              echo "metaflow installed in worker container"
              break
            fi
            echo "Waiting for worker container ($i/30)..."
            sleep 2
          done
          docker exec windmill_worker python3 -c "import metaflow; print('metaflow', metaflow.__version__)" || \
            echo "WARNING: metaflow import failed in worker container"

      - name: Wait for Windmill to be ready
        run: |
          READY=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Windmill HTTP is ready after ${i} attempts"
              READY=1
              break
            fi
            echo "Waiting for Windmill... ($i/60)"
            sleep 5
          done
          if [ "$READY" -eq 0 ]; then
            echo "ERROR: Windmill never became healthy. Container logs:"
            docker logs --tail=50 windmill_server || true
            exit 1
          fi

      - name: Get Windmill token
        id: windmill_token
        run: |
          for i in $(seq 1 40); do
            # Windmill returns the token in the Set-Cookie header, not JSON body.
            # Use -c /dev/stdout to capture cookies, then extract the token value.
            TOKEN_VALUE=$(curl -s -c /dev/stdout -X POST http://localhost:8000/api/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"admin@windmill.dev","password":"changeme"}' \
              2>/dev/null | awk '/\ttoken\t/{print $NF}' | head -1)
            if [ -n "$TOKEN_VALUE" ]; then
              echo "token=$TOKEN_VALUE" >> $GITHUB_OUTPUT
              echo "Windmill auth ready after $i attempt(s)"
              break
            fi
            echo "Auth not ready yet ($i/40), waiting..."
            sleep 5
          done
          if [ -z "$TOKEN_VALUE" ]; then
            echo "ERROR: Failed to obtain Windmill token after 40 attempts"
            docker logs --tail=50 windmill_server || true
            exit 1
          fi

      - name: Export Windmill credentials
        run: |
          echo "WINDMILL_HOST=http://localhost:8000" >> "$GITHUB_ENV"
          echo "WINDMILL_TOKEN=${{ steps.windmill_token.outputs.token }}" >> "$GITHUB_ENV"
          echo "WINDMILL_WORKSPACE=admins" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          use-sudo: "true"
          conda: "false"
          coverage-artifact-suffix: "${{ matrix.test }}"
          pytest-args: "-v --tb=long --timeout=300 -k '${{ matrix.test }} and deployer' --only-backend windmill --cov-fail-under=0"
          test-files: "test_basic.py"
          ux-test-config: |
            backends:
              - name: windmill
                scheduler_type: windmill
                cluster: null
                decospec: null
                deploy_args:
                  windmill_host: http://localhost:8000
                  windmill_token: "${{ steps.windmill_token.outputs.token }}"
                  windmill_workspace: admins
                enabled: true

      - name: Dump Windmill worker logs (on failure)
        if: failure()
        run: |
          echo "=== Windmill worker logs ==="
          docker logs --tail=200 windmill_worker 2>&1 || echo "(no worker logs)"
          echo "=== Windmill server logs ==="
          docker logs --tail=100 windmill_server 2>&1 || echo "(no server logs)"
          echo "=== Metaflow sysroot tree (host) ==="
          sudo find /tmp/mf-windmill-test -ls 2>/dev/null || echo "(sysroot empty on host)"
          echo "=== Metaflow sysroot tree (inside worker container) ==="
          docker exec windmill_worker find /tmp/mf-windmill-test -ls 2>/dev/null || echo "(sysroot empty in container)"
          echo "=== Windmill python3 path in worker ==="
          docker exec windmill_worker which python3 2>/dev/null || echo "(no python3)"
          docker exec windmill_worker python3 -c "import metaflow; print('metaflow OK:', metaflow.__version__)" 2>&1 || echo "(metaflow not importable)"
          echo "=== Windmill completed jobs (last 10) ==="
          curl -sf -H "Authorization: Bearer ${{ steps.windmill_token.outputs.token }}" \
            "http://localhost:8000/api/w/admins/jobs/completed/list?per_page=10&order_desc=true" 2>/dev/null | python3 -m json.tool 2>/dev/null | head -200 || echo "(could not list jobs)"
          echo "=== Last flow job result ==="
          # Find the most recent flow job and dump its result + logs
          FLOW_JOB=$(curl -sf -H "Authorization: Bearer ${{ steps.windmill_token.outputs.token }}" \
            "http://localhost:8000/api/w/admins/jobs/completed/list?per_page=5&order_desc=true" 2>/dev/null \
            | python3 -c "import sys,json; jobs=json.load(sys.stdin); print(next((j['id'] for j in jobs if j.get('job_kind')=='flow'), 'none'))" 2>/dev/null) || true
          if [ -n "$FLOW_JOB" ] && [ "$FLOW_JOB" != "none" ]; then
            echo "Flow job ID: $FLOW_JOB"
            curl -sf -H "Authorization: Bearer ${{ steps.windmill_token.outputs.token }}" \
              "http://localhost:8000/api/w/admins/jobs_u/get/$FLOW_JOB" 2>/dev/null | python3 -m json.tool 2>/dev/null | head -100 || true
          fi

  test-report:
    if: always()
    needs: [unit-tests, deployer-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test report
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false
